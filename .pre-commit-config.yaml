# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for available hooks
#
# Usage:
#   pip install pre-commit  (or: uv add --dev pre-commit)
#   pre-commit install --hook-type pre-commit --hook-type commit-msg --hook-type pre-push
#
# Skip hooks when needed:
#   git commit --no-verify
#   git push --no-verify
#
# Update hook versions:
#   pre-commit autoupdate

default_stages: [pre-commit]

# Skip hooks in CI environments
ci:
  skip: [pytest-backend, vue-tsc-check, mypy-backend]

repos:
  # ============================================================
  # General file quality hooks (fast, language-agnostic)
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=auto]
      - id: check-case-conflict
      - id: check-symlinks

  # ============================================================
  # Python: Ruff linting + formatting (staged files only)
  # Replaces black + isort + flake8, much faster
  # ============================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      # Linting with auto-fix
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      # Formatting (replaces black)
      - id: ruff-format
        types_or: [python, pyi]

  # ============================================================
  # Commit message: Enforce Conventional Commits
  # Format: type(scope): description
  # ============================================================
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - test
          - chore
          - perf
          - ci
          - build
          - revert

  # ============================================================
  # Pre-push hooks (slower checks, run before push only)
